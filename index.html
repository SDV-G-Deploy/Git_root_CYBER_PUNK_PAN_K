<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chain Lab Bootstrap</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="hud">
      <h1 class="title">Chain Lab</h1>
      <div class="stats">
        <span id="scoreLabel">Score: 0</span>
        <span id="shotsLabel">Shots: 1</span>
        <span id="targetLabel">Target: 0</span>
        <span id="levelLabel">Level: L01</span>
      </div>
      <label class="level-select-wrap" for="levelSelect">Level</label>
      <select id="levelSelect" aria-label="Select level"></select>
      <button id="retryButton" type="button">Retry</button>
    </header>

    <canvas id="chainlab-canvas" width="960" height="540" aria-label="Chain Lab Arena"></canvas>

    <section class="summary" aria-live="polite">
      <span id="summaryResult">Result: in_progress</span>
      <span id="summaryScore">Final Score: 0</span>
      <span id="summaryDepth">Chain Depth: 0</span>
      <span id="summaryAccuracy">Accuracy: 0%</span>
    </section>

    <section id="outcomePanel" class="outcome hidden" aria-live="polite">
      <strong id="outcomeText">Run status</strong>
      <div class="outcome-actions">
        <button id="summaryRetryButton" type="button">Retry</button>
        <button id="nextButton" type="button">Next</button>
      </div>
    </section>

    <p class="hint">Move mouse to aim. Click to fire one shot.</p>
  </main>

  <script src="levels.js" defer></script>
  <script src="game.js" defer></script>
  <script src="main.js" defer></script>
</body>
</html>
